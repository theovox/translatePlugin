<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .header a {
      font-size: 12px;
      color: #1a73e8;
      text-decoration: none;
      cursor: pointer;
    }
    .section {
      padding: 12px 16px;
    }
    .section + .section {
      border-top: 1px solid #f0f0f0;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    select, input[type="text"], textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      background: #fafafa;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #1a73e8;
      background: #fff;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row > div { flex: 1; }
    .btn-group {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
    }
    .btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-primary:hover { background: #1557b0; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .mode-switch {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-switch button {
      flex: 1;
      padding: 7px 0;
      border: none;
      background: #fafafa;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .mode-switch button.active {
      background: #1a73e8;
      color: #fff;
    }
    .translate-box {
      padding: 0 16px 4px;
    }
    .translate-box textarea {
      height: 60px;
      resize: none;
      margin-bottom: 6px;
    }
    .result-box {
      padding: 8px 10px;
      background: #f5f8ff;
      border-radius: 6px;
      min-height: 36px;
      font-size: 13px;
      color: #222;
      line-height: 1.5;
      word-break: break-word;
    }
    .result-box.empty {
      color: #999;
      font-style: italic;
    }
    .engine-desc {
      padding: 4px 16px 0;
      font-size: 11px;
      color: #999;
    }
    .shortcuts {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    .shortcuts kbd {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>翻译助手</h1>
    <a id="openOptions">设置</a>
  </div>

  <div class="section">
    <div class="row">
      <div>
        <label>翻译引擎</label>
        <select id="engine"></select>
        <div id="engineDesc" class="engine-desc"></div>
      </div>
      <div>
        <label>目标语言</label>
        <select id="targetLang"></select>
      </div>
    </div>
    <label>显示模式</label>
    <div class="mode-switch">
      <button data-mode="bilingual" class="active">双语对照</button>
      <button data-mode="replace">替换原文</button>
    </div>
  </div>

  <div class="translate-box">
    <label>输入文本翻译</label>
    <textarea id="inputText" placeholder="输入或粘贴要翻译的文本..."></textarea>
    <div id="resultBox" class="result-box empty">翻译结果将显示在这里</div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="translatePageBtn">翻译整页</button>
    <button class="btn btn-secondary" id="translateInputBtn">翻译文本</button>
  </div>

  <div class="shortcuts">
    <kbd>Alt+T</kbd> 翻译整页 &nbsp; <kbd>Alt+S</kbd> 翻译选中 &nbsp; <kbd>Alt+R</kbd> 切换原文/译文 &nbsp; <kbd>Alt+A</kbd> 自动翻译
  </div>

  <script src="popup.js"></script>
</body>
</html>
